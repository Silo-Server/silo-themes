name: Update Theme Catalog

on:
  push:
    branches:
      - main
    paths:
      - "themes/**"
      - "scripts/update-catalog.py"
      - ".github/workflows/update-catalog.yml"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: theme-catalog-${{ github.ref }}
  cancel-in-progress: false

jobs:
  update-catalog:
    if: github.ref_type == 'branch'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      - name: Detect theme changes
        id: changes
        run: |
          touch_arg=""

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            touch_arg="--touch"
          elif git rev-parse --verify "${{ github.event.before }}" >/dev/null 2>&1; then
            theme_changes="$(git diff --name-only "${{ github.event.before }}" "${{ github.sha }}" -- themes)"
            if [ -n "$theme_changes" ]; then
              touch_arg="--touch"
            fi
          fi

          echo "touch_arg=$touch_arg" >> "$GITHUB_OUTPUT"

      - name: Generate catalog
        run: python3 scripts/update-catalog.py ${{ steps.changes.outputs.touch_arg }}

      - name: Open catalog update pull request
        env:
          GH_TOKEN: ${{ github.token }}
          BRANCH_NAME: automation/update-theme-catalog
        run: |
          if git diff --quiet -- catalog.json; then
            echo "catalog.json already up to date"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -B "$BRANCH_NAME"
          git add catalog.json
          git commit -m "chore: update theme catalog"

          git fetch origin "$BRANCH_NAME:refs/remotes/origin/$BRANCH_NAME" || true
          git push --force-with-lease origin "$BRANCH_NAME"

          if gh pr view "$BRANCH_NAME" >/dev/null 2>&1; then
            echo "Updated existing catalog update pull request"
          else
            gh pr create \
              --base "${{ github.ref_name }}" \
              --head "$BRANCH_NAME" \
              --title "chore: update theme catalog" \
              --body "Automated catalog update generated from themes in \`themes/\`."
          fi
